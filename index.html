<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Environmental Monitor</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Environmental Monitor</h1>
    <div class="header-right">
      <div class="datetime">
        <div class="date" id="date-display"></div>
        <div class="time" id="time-display"></div>
      </div>
      <div class="power-control">
        <div class="power-label">Power</div>
        <label class="toggle">
          <input type="checkbox" id="power-toggle" checked onchange="setPower(this.checked)">
          <span class="toggle-track"></span>
          <span class="toggle-thumb"></span>
        </label>
        <div class="power-status" id="power-status-text">ON</div>
      </div>
    </div>
  </header>

  <div class="bme-status-bar">
    <span class="bme-dot" id="bme-dot"></span>
    <span id="bme-status-text">BME680: Checking...</span>
  </div>

  <div class="error-bar" id="error-bar">Unable to reach Arduino. Check connection.</div>

  <div class="grid">
    <div class="card">
      <div class="card-label">Temperature</div>
      <div class="card-value" id="val-temp">--</div>
      <div class="card-unit">Celsius</div>
      <div class="chart-wrap"><canvas id="chart-temp"></canvas></div>
    </div>

    <div class="card">
      <div class="card-label">Humidity</div>
      <div class="card-value" id="val-humidity">--</div>
      <div class="card-unit">Percent</div>
      <div class="chart-wrap"><canvas id="chart-humidity"></canvas></div>
    </div>

    <div class="card">
      <div class="card-label">Pressure</div>
      <div class="card-value" id="val-pressure">--</div>
      <div class="card-unit">hPa</div>
      <div class="chart-wrap"><canvas id="chart-pressure"></canvas></div>
    </div>

    <div class="card">
      <div class="card-label">Altitude</div>
      <div class="card-value" id="val-altitude">--</div>
      <div class="card-unit">Meters</div>
      <div class="chart-wrap"><canvas id="chart-altitude"></canvas></div>
    </div>

    <div class="card">
      <div class="card-label">Ozone</div>
      <div class="card-value" id="val-ozone">--</div>
      <div class="card-unit">PPM</div>
      <div class="chart-wrap"><canvas id="chart-ozone"></canvas></div>
    </div>

    <div class="card">
      <div class="card-label">Light</div>
      <div class="card-value" id="val-light">--</div>
      <div class="card-unit">Lux</div>
      <div class="chart-wrap"><canvas id="chart-light"></canvas></div>
    </div>
  </div>

  <div class="last-update" id="last-update">Last update: --</div>

  <script src="script.js"></script>
</body>
</html>
